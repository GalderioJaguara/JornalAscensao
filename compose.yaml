services:
  jornalascensao:
    image: jornalascensao
    build:
      context: .
      dockerfile: JornalAscensao/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      ascensao-postgres:
        condition: service_started
    networks:
      - ascensao_network
        
    
  ascensao-postgres:
    image: postgres:15.3-alpine
    container_name: dcs-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: DDREzNlJI98FhpZ6SG4BePGCarQPmm
      POSTGRES_USER: postgres
    ports:
      - 5432:5432
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - ascensao_network
    
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - ascensao_network
    depends_on:
      jornalascensao:
        condition: service_started


volumes:
  postgres:
    
networks:
  ascensao_network:
    driver: bridge
