services:
  jornalascensao:
    image: jornalascensao
    build:
      context: .
      dockerfile: JornalAscensao/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8080:8080"
    depends_on:
      ascensao-postgres:
        condition: service_started
    networks:
      - ascensao_network
        
    
  ascensao-postgres:
    image: postgres:15.3-alpine
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: DDREzNlJI98FhpZ6SG4BePGCarQPmm
    volumes:
      - postgres:/var/lib/postgresql/data
    networks:
      - ascensao_network
    healthcheck: # Adicione health check
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 30s
      timeout: 10s
      retries: 5
  
  
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - ascensao_network
    depends_on:
      jornalascensao:
        condition: service_started
    

volumes:
  postgres:
    
networks:
  ascensao_network:
    driver: bridge
